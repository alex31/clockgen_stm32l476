MCU_MODEL = STM32L476R(C-E-G)Tx
CHIBIOS_VERSION = 3.0

HEADER

/*
 * Setup for STMicroelectronics STM32 Nucleo32-L476RG board.
 */

/*
 * Board identifier.
 */
#define BOARD_ST_NUCLEO64_L476RG
#define BOARD_NAME                  "STMicroelectronics STM32 Nucleo64-L476RG"

/*
 * Board oscillators-related settings.
 */
#if !defined(STM32_LSECLK)
#define STM32_LSECLK                32768U
#endif

#define STM32_LSEDRV                (3U << 3U)

#if !defined(STM32_HSECLK)
#define STM32_HSECLK                8000000U
#endif

#define STM32_HSE_BYPASS

/*
 * Board voltages.
 * Required for performance limits calculation.
 */
#define STM32_VDD                   300U

/*
 * MCU type as defined in the ST header.
 */
#define STM32L476xx

/*
 * IO pins assignments.
 */
CONFIG
# PIN NAME PERIPH_TYPE AF_NUMBER or
# PIN NAME FUNCTION PP_or_OPENDRAIN PIN_SPEED PULL_RESISTOR INITIAL_LEVEL AF_NUMBER
# SPEED : SPEED_VERYLOW, SPEED_LOW, SPEED_MEDIUM, SPEED_HIGH
#
# DEFAULT AND SYS
DEFAULT ANALOG   	PUSHPULL	SPEED_VERYLOW	FLOATING LEVEL_HIGH AF0	ASCR_DISABLED LOCKR_DISABLED

PA13	SWDIO     	SWDIO		AF:SYS_JTMS-SWDIO
PA14	SWCLK     	SWDIO		AF:SYS_JTCK-SWCLK
PC14	RCC_OSC32_IN    SYS		RCC_OSC32_IN
PC15	RCC_OSC32_OUT   SYS		RCC_OSC32_OUT


PA01	TTL_RESET_OUT   OUTPUT		PUSHPULL	 LEVEL_LOW # PA01	CN7-30 
PA02	VCP_TX    	UART		AF:USART2_TX	 3_3VOLTS# PA02	CN10-35
PA03	VCP_RX    	UART		AF:USART2_RX	 3_3VOLTS# PA03	CN10-37
PA04	BUZZER_OUT 	DAC		DAC1_OUT1	 # PA04	CN7-32 
PA05	LED_GREEN 	LED				 # PA05	CN10-11
PA06	CLOCK_F1_OUT	PWM		AF:TIM3_CH1	 0_0VOLTS# PA06	CN10-13
PA07	LOGIC_VOLTAGE   ADC		ADC1_IN12	 # PA07    CN10-15 (ratio ?)
PA08	BOUTON_F1_IN_A  TIM		AF:TIM1_CH1	 PULLUP # PA08	CN10-23
PA09	BOUTON_F1_IN_B  TIM		AF:TIM1_CH2	 PULLUP # PA09	CN10-21
PA10	BUZZER_IN	INPUT		FLOATING		# PA10    CN10-33
PA15	FREQMETER_IN	ICU		AF:TIM2_CH1      # PA15	CN7-17

PB00	LCD_RS		OUTPUT		PUSHPULL	# PB00	CN7-34 
PB01	LCD_RW		OUTPUT		PUSHPULL	# PB01	CN10-24
PB02	LCD_E		OUTPUT		PUSHPULL	# PB02	CN10-22
# PB03 : branché en interne à la sonde de prog
PB04	LCD_D0		OUTPUT		PUSHPULL	# PB04	CN10-27
PB05	LCD_D1		OUTPUT		PUSHPULL	# PB05	CN10-29
PB06	CLOCK_F2_OUT	PWM		AF:TIM4_CH1	# PB06	CN10-17
PB07	LCD_D2		OUTPUT		PUSHPULL	# PB07	CN7-21 
PB08	LCD_D3		OUTPUT		PUSHPULL	# PB08	CN10-3 
PB09	BOUTON_F1_SW	INPUT		PULLUP		# PB09	CN10-5 
PB10	BOUTON_F2_SW	INPUT		PULLUP		# PB10	CN10-25
PB14	LCD_CONTRAST	PWM		AF:TIM15_CH1    # PB14	CN10-28

PC00    SUPPLY_VOLTAGE  ADC             ADC1_IN1	       # PC00    CN7-38 (ratio ?)
PC06	BOUTON_F2_IN_A  TIM		AF:TIM8_CH1	PULLUP # PC06	CN10-4 
PC07	BOUTON_F2_IN_B  TIM		AF:TIM8_CH2	PULLUP # PC07	CN10-19

