MCU_MODEL = STM32L476R(C-E-G)Tx
CHIBIOS_VERSION = 3.0

HEADER

/*
 * Setup for STMicroelectronics STM32 Nucleo32-L476RG board.
 */

/*
 * Board identifier.
 */
#define BOARD_ST_NUCLEO64_L476RG
#define BOARD_NAME                  "STMicroelectronics STM32 Nucleo64-L476RG"

/*
 * Board oscillators-related settings.
 */
#if !defined(STM32_LSECLK)
#define STM32_LSECLK                32768U
#endif

#define STM32_LSEDRV                (3U << 3U)

#if !defined(STM32_HSECLK)
#define STM32_HSECLK                8000000U
#endif

#define STM32_HSE_BYPASS

/*
 * Board voltages.
 * Required for performance limits calculation.
 */
#define STM32_VDD                   300U

/*
 * MCU type as defined in the ST header.
 */
#define STM32L476xx

/*
 * IO pins assignments.
 */
CONFIG
# PIN NAME PERIPH_TYPE AF_NUMBER or
# PIN NAME FUNCTION PP_or_OPENDRAIN PIN_SPEED PULL_RESISTOR INITIAL_LEVEL AF_NUMBER
# SPEED : SPEED_VERYLOW, SPEED_LOW, SPEED_MEDIUM, SPEED_HIGH
#
# DEFAULT AND SYS
DEFAULT ANALOG   	PUSHPULL	SPEED_VERYLOW	FLOATING LEVEL_HIGH AF0	ASCR_DISABLED LOCKR_DISABLED

PA00	FREQMETER_IN	ICU		AF:TIM2_CH1
PA02	VCP_TX    	UART		AF:USART2_TX
PA03	VCP_RX    	UART		AF:USART2_RX
PA04	BUZZER_OUT 	DAC		DAC1_OUT1
PA05	LED_GREEN 	LED
PA06	CLOCK_F1_OUT	PWM		AF:TIM3_CH1
PA08	BOUTON_F1_IN_A  TIM		AF:TIM1_CH1	
PA09	BOUTON_F1_IN_B  TIM		AF:TIM1_CH2
PA13	SWDIO     	SWDIO		AF:SYS_JTMS-SWDIO
PA14	SWCLK     	SWDIO		AF:SYS_JTCK-SWCLK

PB06	CLOCK_F2_OUT	PWM		AF:TIM4_CH1
PB14	LCD_CONTRAST	PWM		AF:TIM15_CH1

PC06	BOUTON_F2_IN_A  TIM		AF:TIM8_CH1	
PC07	BOUTON_F2_IN_B  TIM		AF:TIM8_CH2

PC14	RCC_OSC32_IN    SYS		RCC_OSC32_IN
PC15	RCC_OSC32_OUT   SYS		RCC_OSC32_OUT











